name: Testes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Executar testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes
        run: npm test
        env:
          NODE_ENV: test
          SESSION_SECRET: secret-de-teste-para-ci
